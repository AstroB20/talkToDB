# ── TalktoDB — Cloud Build CI/CD ──────────────────────────────────────────
#
# Triggered on every push to `main`. Builds api + ui images, then deploys
# them to Cloud Run in us-central1.
#
# One-time setup (run in your GCP project before first deploy):
#
#   export PROJECT_ID=$(gcloud config get-value project)
#
#   # 1. Enable required APIs
#   gcloud services enable \
#     cloudbuild.googleapis.com \
#     run.googleapis.com \
#     artifactregistry.googleapis.com
#
#   # 2. Create Artifact Registry repository
#   gcloud artifacts repositories create talktodb \
#     --repository-format=docker \
#     --location=us-central1
#
#   # 3. Grant Cloud Build permission to deploy to Cloud Run
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/run.admin"
#
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/iam.serviceAccountUser"
#
#   # 4. Store your Gemini API key in Secret Manager:
#   #    echo -n "YOUR_KEY" | gcloud secrets create GEMINI_API_KEY --data-file=-
#   #    Then grant Cloud Run access to the secret.
#
#   # 5. Connect your GitHub repo in Cloud Build console:
#   #    https://console.cloud.google.com/cloud-build/triggers
#   #    → Create trigger → Push to main branch → point to this file
#
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: talktodb
  _AGENT_ROLE: analyst

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:

  # ── Stage 1: Build images in parallel ────────────────────────────────────

  - id: build-api
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:latest
      - .

  - id: build-ui
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - Dockerfile.ui
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:latest
      - .

  # ── Stage 2: Push images ─────────────────────────────────────────────────

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api"]

  - id: push-ui
    name: gcr.io/cloud-builders/docker
    waitFor: [build-ui]
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui"]

  # ── Stage 3: Deploy API ───────────────────────────────────────────────────
  # NOTE: uploaded files are stored in Cloud Storage or a mounted volume in
  # production. For a quick start, use --execution-environment=gen2 with a
  # Cloud Storage FUSE mount for the /app/data directory.

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - talktodb-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --ingress=internal
      - --memory=1Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-env-vars=AGENT_ROLE=${_AGENT_ROLE}
      # Pass GEMINI_API_KEY from Secret Manager:
      # - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest

  # ── Stage 4: Deploy UI (depends on API URL) ───────────────────────────────

  - id: deploy-ui
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-api, push-ui]
    entrypoint: bash
    args:
      - -c
      - |
          API_URL=$(gcloud run services describe talktodb-api \
            --region=${_REGION} \
            --format='value(status.url)')

          gcloud run deploy talktodb-ui \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --ingress=all \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60 \
            --set-env-vars="API_URL=$${API_URL}"

  # ── Print the public UI URL ───────────────────────────────────────────────

  - id: print-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-ui]
    entrypoint: bash
    args:
      - -c
      - |
          UI_URL=$(gcloud run services describe talktodb-ui \
            --region=${_REGION} \
            --format='value(status.url)')
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "  ✅ TalktoDB deployed successfully!"
          echo "  🌐 UI: $UI_URL"
          echo "╚══════════════════════════════════════════╝"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA

#
# Triggered on every push to `main`. Builds 3 images in parallel,
# then deploys them sequentially to Cloud Run in us-central1.
#
# One-time setup (run these in your GCP project before first deploy):
#
#   export PROJECT_ID=$(gcloud config get-value project)
#
#   # 1. Enable required APIs
#   gcloud services enable \
#     cloudbuild.googleapis.com \
#     run.googleapis.com \
#     artifactregistry.googleapis.com
#
#   # 2. Create Artifact Registry repository
#   gcloud artifacts repositories create talktodb \
#     --repository-format=docker \
#     --location=us-central1
#
#   # 3. Grant Cloud Build permission to deploy to Cloud Run
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/run.admin"
#
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member="serviceAccount:$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/iam.serviceAccountUser"
#
#   # 4. Connect your GitHub repo in Cloud Build console:
#   #    https://console.cloud.google.com/cloud-build/triggers
#   #    → Create trigger → Push to main branch → point to this file
#
#   # 5. Set env vars on each Cloud Run service after first deploy:
#   #
#   #   MCP service:
#   #     AGENT_ROLE, CLOUD_SQL_MYSQL_PASSWORD (if using Cloud SQL)
#   #
#   #   API service:
#   #     GEMINI_API_KEY, AGENT_ROLE, MCP_SERVER_URL (set to MCP Cloud Run URL)
#   #
#   #   UI service:
#   #     API_URL (set to API Cloud Run URL)
#
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: talktodb                      # Artifact Registry repository name
  _AGENT_ROLE: analyst                 # default role for deployed services

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM               # faster builds — parallelism below needs it

steps:

  # ── Stage 1: Build all 3 images in parallel ──────────────────────────────

  - id: build-mcp
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]                      # start immediately, no dependency
    args:
      - build
      - -f
      - Dockerfile.mcp
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-mcp:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-mcp:latest
      - .

  - id: build-api
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:latest
      - .

  - id: build-ui
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - Dockerfile.ui
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:latest
      - .

  # ── Stage 2: Push all 3 images in parallel ───────────────────────────────

  - id: push-mcp
    name: gcr.io/cloud-builders/docker
    waitFor: [build-mcp]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-mcp

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api

  - id: push-ui
    name: gcr.io/cloud-builders/docker
    waitFor: [build-ui]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui

  # ── Stage 3: Deploy MCP server first (API depends on its URL) ────────────

  - id: deploy-mcp
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-mcp]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - talktodb-mcp
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-mcp:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated      # internal only — not reachable from the internet
      - --ingress=internal              # only callable from within the same project's services
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0              # scale to zero when idle
      - --max-instances=5
      - --timeout=60
      - --set-env-vars=AGENT_ROLE=${_AGENT_ROLE},MCP_HOST=0.0.0.0

  # ── Capture MCP URL and deploy API ───────────────────────────────────────
  # Cloud Run assigns a stable URL per service; we read it back and inject
  # it into the API deployment so the agent knows where to call the MCP server.

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-mcp, push-api]
    entrypoint: bash
    args:
      - -c
      - |
          MCP_URL=$(gcloud run services describe talktodb-mcp \
            --region=${_REGION} \
            --format='value(status.url)')

          echo "MCP server URL: $$MCP_URL"

          gcloud run deploy talktodb-api \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --no-allow-unauthenticated \
            --ingress=internal \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --set-env-vars="AGENT_ROLE=${_AGENT_ROLE},MCP_SERVER_URL=$${MCP_URL}/sse"

  # ── Deploy UI last (depends on API URL) ──────────────────────────────────

  - id: deploy-ui
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-api, push-ui]
    entrypoint: bash
    args:
      - -c
      - |
          API_URL=$(gcloud run services describe talktodb-api \
            --region=${_REGION} \
            --format='value(status.url)')

          echo "API server URL: $API_URL"

          gcloud run deploy talktodb-ui \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --allow-unauthenticated \   # public-facing — users access this
            --ingress=all \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60 \
            --set-env-vars="API_URL=$${API_URL}"

  # ── Print the public UI URL at the end ───────────────────────────────────

  - id: print-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-ui]
    entrypoint: bash
    args:
      - -c
      - |
          UI_URL=$(gcloud run services describe talktodb-ui \
            --region=${_REGION} \
            --format='value(status.url)')
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "  ✅ TalktoDB deployed successfully!"
          echo "  🌐 UI: $UI_URL"
          echo "╚══════════════════════════════════════════╝"

# ── Images stored in Artifact Registry ───────────────────────────────────────
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-mcp:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-api:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb-ui:$COMMIT_SHA
