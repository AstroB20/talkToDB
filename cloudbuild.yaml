substitutions:
  _REGION: us-central1
  _REPO: talktodb
  _AGENT_ROLE: analyst

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:

  # -- Build -----------------------------------------------------------------

  - id: build
    name: gcr.io/cloud-builders/docker
    args: [build, -f, Dockerfile,
           -t, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb:$COMMIT_SHA",
           -t, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb:latest", .]

  # -- Push ------------------------------------------------------------------

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb"]

  # -- Deploy ----------------------------------------------------------------

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - talktodb
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --ingress=all
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-env-vars=AGENT_ROLE=${_AGENT_ROLE},API_URL=http://localhost:8000
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/talktodb:$COMMIT_SHA
