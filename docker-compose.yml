# ── TalktoDB — Local Development Stack ────────────────────────────────────
# Single container: FastAPI (port 8000) + Streamlit (port 8501) in one image.
#
# Usage:
#   cp .env.example .env        # fill in GEMINI_API_KEY
#   docker compose up --build
#
# Services:
#   app  → http://localhost:8501  (Streamlit UI)
#        → http://localhost:8000  (API docs at /docs)
# ─────────────────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: talktodb
    container_name: talktodb
    env_file: .env
    environment:
      AGENT_ROLE: "${AGENT_ROLE:-admin}"
      API_URL: "http://localhost:8000"
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data          # datasets live here; mount rw so uploads persist
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
